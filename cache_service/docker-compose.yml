services:

  # ================= ZOOKEEPER =================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "2181:2181"


  # ================= KAFKA =================
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  # ================= RESPONSE GENERATOR =================
  response-generator:
    build: ../Consultas
    container_name: response-generator

    ports:
      - "8001:8001"


  # ================= CACHE =================
  cache-service:
    build: .
    container_name: cache-service

    ports:
      - "8000:8000"

    depends_on:
      - response-generator

    environment:
      - VERSION=v2


  # ================= TRAFFIC GENERATOR / PRODUCER =================
  traffic-generator:
    build: ../Generador_Trafico
    container_name: traffic-generator

    depends_on:
      - kafka

    environment:
      - VERSION=v2

    volumes:
      - ../Generador_Trafico/images:/app/images


  # ================= CONSUMER =================
  consumer:
    build: ../Consumer
    container_name: consumer

    depends_on:
      - kafka
      - cache-service

    environment:
      - VERSION=v2